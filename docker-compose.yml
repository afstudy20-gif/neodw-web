services:
  orthanc:
    image: orthancteam/orthanc:25.4.0
    container_name: remote-dicom-orthanc
    restart: unless-stopped
    expose:
      - "8042"
      - "4242"
    volumes:
      - ./orthanc-data:/var/lib/orthanc/db
      - ./orthanc.json:/etc/orthanc/orthanc.json:ro

  viewer:
    build: .
    container_name: remote-dicom-viewer
    restart: unless-stopped
    expose:
      - "80"

  caddy:
    image: caddy:2.10-alpine
    container_name: remote-dicom-caddy
    restart: unless-stopped
    ports:
      - "8043:8043"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - orthanc
      - viewer
