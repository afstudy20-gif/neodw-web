server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cross-origin isolation: required for SharedArrayBuffer + multi-threaded
    # WASM in Cornerstone3D. credentialless (not require-corp) lets
    # no-credentials subresources load without explicit CORP headers, which
    # is the right call now that Google Fonts is self-hosted (@fontsource)
    # and the mapmyvisitors visitor-counter widget has been removed.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    location / {
        # Never cache index.html — asset bundle hashes change every build;
        # a stale index.html ends up referencing .js files that no longer
        # exist on the server, producing a blank page and 404 on the chunk.
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        # add_header at the server level is NOT inherited once any add_header
        # is set inside a location block — must repeat the isolation headers
        # here or the page will not be cross-origin-isolated.
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
    }

    gzip on;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/wasm;
    gzip_min_length 1024;
}
