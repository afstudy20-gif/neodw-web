# Resolver — needed for RUNTIME DNS of the Orthanc service name.
# 127.0.0.11 is Docker's embedded DNS; ipv6=off skips AAAA lookups that
# hang on hosts where IPv6 isn't wired through. valid=10s re-resolves on
# container restart so we don't pin a stale IP after a redeploy.
#
# An `upstream { server orthanc:8042; }` block would resolve at config-load
# time — nginx then exits if the name isn't in DNS yet (race with the
# orthanc container coming up under Coolify). Setting the upstream into a
# variable inside the location forces nginx to use the resolver instead.
resolver 127.0.0.11 ipv6=off valid=10s;

# Map OPTIONS → empty body, anything else → proxied path. Used by the
# DICOMweb preflight short-circuit below.
map $request_method $cors_preflight {
    OPTIONS 1;
    default 0;
}

server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cross-origin isolation for Cornerstone WASM threads. credentialless lets
    # no-credentials subresources load without explicit CORP headers — needed
    # because @fontsource assets ship without CORP.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # DICOMweb (QIDO + WADO-RS) → Orthanc service. CORS preflights are
    # answered here because Orthanc returns 404 on OPTIONS, which would
    # otherwise break browser fetches that carry non-safelisted Accept values.
    location /dicom-web/ {
        if ($cors_preflight) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "*" always;
            add_header Access-Control-Max-Age "86400" always;
            return 204;
        }
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
        set $orthanc_upstream http://orthanc:8042;
        proxy_pass $orthanc_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WADO-RS frames can be large (multi-MB encapsulated JPEG/JP2K).
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 0;
    }

    # Orthanc REST API + Explorer 2 UI. Used for uploads, study listing,
    # deletes, and the admin web UI at /orthanc/ui/.
    location /orthanc/ {
        if ($cors_preflight) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "*" always;
            add_header Access-Control-Max-Age "86400" always;
            return 204;
        }
        add_header Access-Control-Allow-Origin "*" always;
        set $orthanc_upstream http://orthanc:8042;
        rewrite ^/orthanc/(.*)$ /$1 break;
        proxy_pass $orthanc_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 0;
    }

    # Asset bundles — long-lived; SPA build hashes the filenames.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
    }

    # SPA fallback. Must come last so /dicom-web and /orthanc match first.
    location / {
        # Never cache index.html — asset bundle hashes change every build;
        # a stale index.html ends up referencing .js files that no longer
        # exist on the server, producing a blank page and 404 on the chunk.
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/wasm;
    gzip_min_length 1024;
}
